on:
  push:
    paths:
      - *.py
      - *.txt
      - *.html
      - startup.sh
      - Dockerfile

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract metadata
        uses: docker/metadata-action@v6
        with:
          images: richardg867/waybackproxy
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm/v5,linux/arm/v6,linux/arm/v7,linux/arm64,linux/386,linux/ppc64le,linux/riscv64,linux/s390x # supported by official Python image
          push: true
          tags: richardg867/waybackproxy:latest
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/richardg867/waybackproxy
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
